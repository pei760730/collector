name: collect

# 定時把 Telegram 這段時間囤的訊息撈乾、解析、寫進「參考池」,然後結束。
# 取代常駐機器:repo 是 public → Actions 免費額度無上限,$0。
# Telegram 保留未領更新約 24h,只要間隔 < 24h 就不漏訊息。
on:
  schedule:
    - cron: "0 * * * *" # 每小時整點(UTC);收訊息延遲最多約 1 小時
  workflow_dispatch: {} # 手動補跑

# 同時只跑一個,避免兩個 job 並行領 getUpdates 互搶(會漏 ack)。
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 保險:任何意外卡死 10 分鐘殺掉,別吃滿 6h 額度、堵住後續 cron
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: drain
        run: npm run drain
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          STORAGE: sheets
          # cron 無人等候,展開 TikTok 等短連結→正規連結,讓短/長連結去重一致。
          # 展開失敗會優雅退回原值(不會更糟)。
          EXPAND_SHORT_URLS: "true"
          # 寫表失敗時的 Telegram 告警對象(chat id 非機密,已公開於 .env.example)。
          # 沒設的話 notifyError 會 no-op,cron 默默壞掉收不到通知。
          ERROR_CHAT_ID: "-48214680"

      # drain 層崩潰(如 ensureHeader 對 live 表頭斷言失敗 = 跨 repo 契約漂移)會 process.exit(1),
      # 但那發生在逐筆 notifyError 之前 → 不會走 in-app 告警。這一步補:job 失敗就 Telegram 喊一聲,
      # 否則只剩 GitHub 紅燈(owner chat-only 看不到)。契約漂移 ≤1h(cron)內就被這條叫出來。
      - name: Notify Telegram on failure
        if: failure()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: "-48214680"
        run: |
          if [ -z "$TG_TOKEN" ]; then echo "no TELEGRAM_BOT_TOKEN → skip"; exit 0; fi
          MSG="🔴 short-video-bot collect 失敗(可能參考池表頭漂移/ensureHeader 拒寫)。${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS --max-time 20 "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" --data-urlencode "chat_id=${TG_CHAT}" --data-urlencode "text=${MSG}" >/dev/null && echo "telegram notified" || echo "telegram notify failed (ignored)"
