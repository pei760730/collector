name: CI

on:
  push:
    branches: [main]
  pull_request:

# 最小權限:CI 只讀 code 跑測試,不需要任何寫入。
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 守門:package.json 宣稱的 collector-core tag 必須 == 實際安裝版本。
      # npm ci 對 git dep 只驗 spec 字串不驗 lock resolved(PR #49 曾綠著裝舊版)。
      - run: node scripts/check-core-version.mjs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
